<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AFTERHOURZ DEPT.</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
font-family:'Archivo Black', sans-serif;
overflow:hidden;
}

/* ACCESS SCREEN */

#accessScreen{
position:fixed;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
background:black;
z-index:2;
}

#accessScreen h1{
font-size:4vw;
letter-spacing:6px;
margin-bottom:40px;
}

input{
background:transparent;
border:1px solid white;
color:white;
padding:15px;
width:260px;
text-align:center;
font-size:16px;
letter-spacing:2px;
outline:none;
margin-bottom:20px;
}

button{
padding:12px 30px;
border:none;
background:white;
font-weight:bold;
cursor:pointer;
}

#message{
margin-top:15px;
color:red;
font-size:14px;
letter-spacing:2px;
}

.access-footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
color:white;
font-family:"Times New Roman", Times, serif;
font-size:20px;
letter-spacing:2px;
}

/* MAIN PAGE */

#mainPage{
position:fixed;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
opacity:0;
pointer-events:none;
transition:1s ease;
}

/* TEXT */

#mainText{
font-size:6vw;
letter-spacing:6px;
text-align:center;
}

/* IMAGE */

#mainImage{
display:none;
max-width:70%;
max-height:70%;
object-fit:contain;
}

/* COUNTDOWN */

#countdown{
margin-top:20px;
font-size:3vw;
letter-spacing:4px;
}

/* FOOTER */

.footer-text{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
color:white;
font-family:"Oswald", Times, serif;
font-size:20px;
letter-spacing:2px;
}

/* ===== GLITCH EVENT ===== */

#glitchOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
opacity:0;
z-index:9999;
background:
repeating-linear-gradient(
0deg,
rgba(255,255,255,0.05) 0px,
rgba(255,255,255,0.05) 2px,
transparent 2px,
transparent 4px
);
mix-blend-mode:overlay;
}

.glitch-active{
animation:glitchFlash 0.15s infinite;
}

@keyframes glitchFlash{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

/* ===== GLOBAL LIKE SYSTEM ===== */

#likeSystem{
position:fixed;
bottom:80px;
width:100%;
text-align:center;
color:white;
z-index:5;
}

#likeButton{
padding:12px 30px;
border:none;
background:white;
font-weight:bold;
cursor:pointer;
letter-spacing:2px;
}

#likeCounter{
margin-top:10px;
font-size:20px;
letter-spacing:3px;
}

</style>
</head>

<body>

<div id="accessScreen">
<h1>Compromised Access</h1>

<input type="text" id="codeInput" placeholder="ENTER PASSWORD">
<button onclick="checkCode()">ENTER</button>

<div id="message"></div>

<div class="access-footer">AFTERHOURZ 2026</div>
</div>

<div id="mainPage">

<h1 id="mainText">We'll be back soon...</h1>

<div id="countdown"></div>

<img id="mainImage" src="">

<div class="footer-text">AFTERHOURZ 2026</div>

</div>

<div id="likeSystem">

<button id="likeButton">JOIN THE SIGNAL</button>

<div id="likeCounter">0</div>

</div>

<div id="glitchOverlay"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const ACCESS_CODE = "WOWDEPT93";
const STORAGE_KEY = "afterhourz_access";

/* CAMBIAR TODO AQUI */

const USE_IMAGE = true;
const IMAGE_FILE = "WFAGSG.png";
const TEXT_MESSAGE = "";

/* FULLSCREEN IMAGE CONTROL */

const FULLSCREENIMAGE = false;
const FULLSCREEN_FILE = "afterhourzgallery.png";

/* ===== NUEVO SISTEMA VIDEO FULLSCREEN ===== */

const ENABLE_FULLSCREEN_VIDEO = false;
const VIDEO_FILE = "afterhourzvideo.mp4.mp4";

/* ===== NUEVO SISTEMA MUSICA ===== */

const ENABLE_BACKGROUND_MUSIC = true;
const MUSIC_FILE = "milan.mp3.mp3";

/* COUNTDOWN CONTROL */

const ENABLE_COUNTDOWN = false;

const GLOBAL_END_DATE = Date.UTC(2026, 2, 3, 5, 0, 0);

/* EVENTO GLITCH */

const GLITCH_EVENT = false;

/* GLOBAL LIKE SYSTEM */

const ENABLE_LIKE_SYSTEM = false;

/* ------------------- */

function unlockSite(){

const access=document.getElementById("accessScreen");
const main=document.getElementById("mainPage");

access.style.display="none";
main.style.opacity="1";
main.style.pointerEvents="auto";

applyContent();

if(ENABLE_COUNTDOWN){
startCountdown();
}else{
document.getElementById("countdown").style.display="none";
}

if(GLITCH_EVENT){
startGlitchEvent();
}

activateFullscreenImage();
activateFullscreenVideo();
activateBackgroundMusic();

}

function applyContent(){

const text=document.getElementById("mainText");
const image=document.getElementById("mainImage");

if(USE_IMAGE){
text.style.display="none";
image.style.display="block";
image.src=IMAGE_FILE;
}else{
image.style.display="none";
text.style.display="block";
text.textContent=TEXT_MESSAGE;
}

}

/* ===== FULLSCREEN IMAGE SYSTEM ===== */

function activateFullscreenImage(){

if(!FULLSCREENIMAGE) return;

const img=document.createElement("img");

img.src=FULLSCREEN_FILE;

img.style.position="absolute";
img.style.top="0";
img.style.left="0";
img.style.width="100%";
img.style.height="100%";
img.style.objectFit="cover";
img.style.zIndex="-1";
img.style.pointerEvents="none";

document.getElementById("mainPage").appendChild(img);

}

/* ===== VIDEO FULLSCREEN ===== */

function activateFullscreenVideo(){

if(!ENABLE_FULLSCREEN_VIDEO) return;

const video=document.createElement("video");

video.src=VIDEO_FILE;
video.autoplay=true;
video.loop=true;
video.muted=true;
video.playsInline=true;

video.style.position="absolute";
video.style.top="0";
video.style.left="0";
video.style.width="100%";
video.style.height="100%";
video.style.objectFit="cover";
video.style.zIndex="-2";
video.style.pointerEvents="none";

document.getElementById("mainPage").appendChild(video);

}

/* ===== NUEVA FUNCION MUSICA ===== */

function activateBackgroundMusic(){

if(!ENABLE_BACKGROUND_MUSIC) return;

const audio=document.createElement("audio");

audio.src=MUSIC_FILE;
audio.loop=true;
audio.autoplay=true;

audio.style.display="none";

document.body.appendChild(audio);

/* FORZAR PLAY PARA EVITAR BLOQUEO */

audio.play().catch(()=>{});



}

function checkCode(){

const input=document.getElementById("codeInput").value;
const message=document.getElementById("message");

if(input===ACCESS_CODE){

localStorage.setItem(STORAGE_KEY,ACCESS_CODE);

const access=document.getElementById("accessScreen");
access.style.transition="1s";
access.style.opacity="0";

setTimeout(()=>{unlockSite();},1000);

}else{
message.textContent="ACCESS DENIED";
}

}

document.getElementById("codeInput")
.addEventListener("keypress",function(e){
if(e.key==="Enter") checkCode();
});

/* COUNTDOWN GLOBAL REAL */

function formatTime(sec){

let h=Math.floor(sec/3600);
let m=Math.floor((sec%3600)/60);
let s=sec%60;

h=String(h).padStart(2,"0");
m=String(m).padStart(2,"0");
s=String(s).padStart(2,"0");

return h+":"+m+":"+s;

}

function startCountdown(){

const el=document.getElementById("countdown");

setInterval(()=>{

let remaining=Math.floor((GLOBAL_END_DATE-Date.now())/1000);

if(remaining<=0){
el.textContent="00:00:00";
return;
}

el.textContent=formatTime(remaining);

},1000);

}

/* ===== GLITCH SYSTEM ===== */

let glitchInterval;

function randomGlitch(){

if(!GLITCH_EVENT) return;

const overlay=document.getElementById("glitchOverlay");

overlay.classList.add("glitch-active");

document.body.style.transform =
"translate("+(Math.random()*8-4)+"px,"+(Math.random()*8-4)+"px)";

setTimeout(()=>{
overlay.classList.remove("glitch-active");
document.body.style.transform="translate(0,0)";
},120+Math.random()*200);

}

function startGlitchEvent(){

glitchInterval=setInterval(()=>{
randomGlitch();
},2000+Math.random()*4000);

}

/* AUTO LOGIN */

window.onload=function(){

const saved=localStorage.getItem(STORAGE_KEY);

if(saved===ACCESS_CODE){
unlockSite();
}

};

/* ===== GLOBAL LIKE SYSTEM SCRIPT ===== */

if(ENABLE_LIKE_SYSTEM){

try{

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
databaseURL: "https://afterhourz-database-default-rtdb.firebaseio.com",
projectId: "YOUR_PROJECT",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "ID",
appId: "APP_ID"
};

if(!firebase.apps.length){
firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();
const likeRef = db.ref("afterhourz_likes");

const likeButton = document.getElementById("likeButton");
const likeCounter = document.getElementById("likeCounter");

likeRef.once("value").then(function(snapshot){

if(snapshot.val() === null){
likeRef.set(0);
}

});

likeRef.on("value", function(snapshot){

likeCounter.textContent = snapshot.val() || 0;

});

likeButton.onclick = function(){

if(localStorage.getItem("afterhourz_liked")) return;

likeRef.transaction(function(current){

return (current || 0) + 1;

});

localStorage.setItem("afterhourz_liked", true);

likeButton.disabled = true;

};

if(localStorage.getItem("afterhourz_liked")){
likeButton.disabled = true;
}

}catch(e){

console.log("LIKE SYSTEM ERROR:", e);

}

}else{

document.getElementById("likeSystem").style.display="none";

}

</script>

</body>
</html>
